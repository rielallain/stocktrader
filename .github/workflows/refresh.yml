name: Refresh market data

# Runs yfinance from a GitHub-hosted runner (different IP space than Render,
# so Yahoo actually serves historical data instead of rate-limiting) and
# POSTs results back to the web app. Used to keep RSI / 200-day SMA and
# other historical-derived fields populated.

on:
  # Every 30 minutes during (and around) US market hours, weekdays only.
  # 13:00-21:00 UTC covers 9:00 AM - 5:00 PM ET in both EST and EDT.
  # At ~2-3 min per run × 17 runs/day × 22 weekdays ≈ 1100 min/month,
  # which fits comfortably under the 2000-min free tier.
  schedule:
    - cron: '*/30 13-21 * * 1-5'
  # Allow manual triggering from the Actions tab
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas==2.2.3 requests==2.32.3

      - name: Refresh market data
        env:
          APP_URL: ${{ vars.APP_URL }}
          BULK_REFRESH_SECRET: ${{ secrets.BULK_REFRESH_SECRET }}
        run: python scripts/refresh_via_github.py
