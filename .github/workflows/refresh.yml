name: Refresh market data

# Fetches daily closes from Twelve Data (Yahoo blocks cloud IPs, and Stooq
# now requires a captcha-gated API key), computes RSI and SMA-200, and POSTs
# back to the web app. Free tier is 8 req/min and 800 req/day, so we run
# every 2 hours during US market hours on weekdays — 5 runs × ~67 tickers
# = ~335 calls/day, well under the cap. Each run takes ~9 min due to the
# 8-sec per-ticker pacing needed to respect the 8/min limit.

on:
  schedule:
    - cron: '0 13-21/2 * * 1-5'
  # Allow manual triggering from the Actions tab
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas==2.2.3 requests==2.32.3

      - name: Refresh market data
        env:
          APP_URL: ${{ vars.APP_URL }}
          BULK_REFRESH_SECRET: ${{ secrets.BULK_REFRESH_SECRET }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python scripts/refresh_via_github.py
